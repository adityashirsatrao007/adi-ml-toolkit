[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ml-hackathon-toolkit"
version = "0.1.0"
description = "The ultimate all-in-one Machine Learning toolkit for hackathons, including every essential library and CLI setup tools."
readme = "README.md"
authors = [
    { name = "Aditya", email = "author@example.com" }
]
license = { text = "MIT" }
requires-python = ">=3.9"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    # Core Data Science
    "numpy",
    "pandas",
    "scipy",
    
    # Machine Learning Core
    "scikit-learn",
    "xgboost",
    "lightgbm",
    "catboost",
    
    # Deep Learning Frameworks
    "torch",
    "torchvision",
    "torchaudio",
    "tensorflow",
    "keras",
    
    # NLP & HuggingFace Ecosystem
    "transformers",
    "datasets",
    "accelerate",
    "huggingface-hub",
    "spacy",
    "nltk",
    "gensim",
    
    # Computer Vision
    "opencv-python",
    "pillow",
    "scikit-image",
    
    # Time Series & Audio
    "librosa",
    "statsmodels",
    "prophet",
    
    # Visualization
    "matplotlib",
    "seaborn",
    "plotly",
    
    # Jupyter & Notebooks
    "jupyterlab",
    "notebook",
    "ipywidgets",
    
    # MLOps & Experiment Tracking
    "mlflow",
    "wandb",
    "optuna",
    
    # Web Apps & APIs (Hackathon Deployments)
    "fastapi",
    "uvicorn",
    "flask",
    "streamlit",
    "gradio",
    "pydantic",
    
    # Utilities & Scraping
    "requests",
    "beautifulsoup4",
    "python-dotenv",
    "sqlalchemy",
]

[project.urls]
Homepage = "https://github.com/adityashirsatrao007/ml-hackathon-toolkit"
Repository = "https://github.com/adityashirsatrao007/ml-hackathon-toolkit.git"

[project.scripts]
ml-setup-clis = "ml_hackathon_toolkit.cli:main"
